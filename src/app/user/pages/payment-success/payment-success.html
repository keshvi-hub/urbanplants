<div class="success-page">

  <!-- Floating Back -->
  <button class="float-back" (click)="goBack()" title="Go Back"><i class="fas fa-arrow-left"></i></button>
  <!-- Floating Go Top -->
  <button class="go-top" [class.visible]="showGoTop" (click)="scrollTop()" title="Back to top"><i class="fas fa-arrow-up"></i></button>

  <!-- Confetti dots -->
  <div class="confetti">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="success-card">

    <!-- Animated checkmark -->
    <div class="check-circle">
      <svg viewBox="0 0 52 52" class="check-svg">
        <circle class="check-circle-bg" cx="26" cy="26" r="25" fill="none"/>
        <path class="check-tick" fill="none" d="M14 27 l8 8 l16-16"/>
      </svg>
    </div>

    <h1 class="success-title">Payment Successful!</h1>
    <p class="success-subtitle">Thank you, <strong>{{ userName }}</strong>! Your order has been placed.</p>

    <div class="order-info">
      <div class="order-row">
        <span class="order-label"><i class="fas fa-receipt"></i> Order ID</span>
        <span class="order-value">#{{ orderId }}</span>
      </div>
      <div class="order-row">
        <span class="order-label"><i class="fas fa-truck"></i> Delivery</span>
        <span class="order-value">3–5 Business Days</span>
      </div>
      <div class="order-row">
        <span class="order-label"><i class="fas fa-map-marker-alt"></i> Status</span>
        <span class="order-value status-badge">Processing</span>
      </div>
    </div>

    <div class="steps">
      <div class="step done">
        <div class="step-icon"><i class="fas fa-check"></i></div>
        <span>Order Placed</span>
      </div>
      <div class="step-line done-line"></div>
      <div class="step active">
        <div class="step-icon"><i class="fas fa-box"></i></div>
        <span>Processing</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-icon"><i class="fas fa-shipping-fast"></i></div>
        <span>Shipped</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-icon"><i class="fas fa-home"></i></div>
        <span>Delivered</span>
      </div>
    </div>

    <div class="action-btns">
      <button class="btn-orders" (click)="goOrders()">
        <i class="fas fa-clipboard-list"></i> View My Orders
      </button>
      <button class="btn-home" (click)="goHome()">
        <i class="fas fa-leaf"></i> Continue Shopping
      </button>
    </div>

    <p class="help-text">
      Need help? <a routerLink="/contact">Contact our support team</a>
    </p>

  </div>

</div>
