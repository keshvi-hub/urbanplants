<div class="admin-page">
  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title">
      <i class="fas fa-plus-circle"></i>
      <h2>Add Category</h2>
    </div>
    <a routerLink="/admin/category" class="btn-secondary">
      <i class="fas fa-arrow-left"></i>
      Back
    </a>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form [formGroup]="frmGrp" (ngSubmit)="onsubmit()">
      <div class="mb-4">
        <label class="form-label">
          <i class="fas fa-tag me-2"></i>Category Name
        </label>
        <input
          type="text"
          formControlName="cat_name"
          class="form-control"
          placeholder="Enter category name"
        />
        <app-validation-message
          [control]="frmGrp.get('cat_name')">
        </app-validation-message>
      </div>

      <div class="mb-4">
        <label class="form-label">
          <i class="fas fa-image me-2"></i>Category Image
        </label>
        <input
          type="file"
          class="form-control"
          (change)="onFileChange($event)"
          accept="image/*"
        />
        <small class="form-text text-muted">Upload a representative image for this category</small>
        <app-validation-message
          [control]="frmGrp.get('cat_pic')">
        </app-validation-message>
      </div>

      <div class="form-actions">
        <a routerLink="/admin/category" class="btn-secondary">
          <i class="fas fa-times me-2"></i>Cancel
        </a>
        <button type="submit" class="btn-add">
          <i class="fas fa-plus-circle me-2"></i>Add Category
        </button>
      </div>
    </form>
  </div>
</div>
